services:
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./pretrained:/app/pretrained:ro
      - ./output:/app/output
      - ./config:/app/config:ro
      - ./src:/app/src:ro
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - PROJECT_ROOT=/app
      - DATA_DIR=/app/data
      - PRETRAINED_DIR=/app/pretrained
      - OUTPUT_DIR=/app/output
      - CONFIG_DIR=/app/config
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
